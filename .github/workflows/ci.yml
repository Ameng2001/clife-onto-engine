name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: pip install pyyaml pytest
      - name: 内核防腐检查（内核无行业词汇）
        run: python scripts/check_kernel_purity.py
      - name: 插件静态能力检查（无逃逸/内核直达）
        run: python scripts/check_plugin_capabilities.py
      - name: pytest（离线确定性测试）
        run: python -m pytest tests/ -q
