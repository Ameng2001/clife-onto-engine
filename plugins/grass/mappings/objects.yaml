# 草业插件·映射注册表（Plugin SPI 槽位 2）
# 声明对象/关系→物理落点与物化策略。后端无关；NebulaGraph adapter / Ontop 虚拟读它。
objects:
  - object: Site                     # 地块/草场
    materialization: hybrid          # 主干物化进图 + 明细虚拟兜底
    physical:
      store: postgis
      table: geo_parcel
      key: parcel_id
      columns: [area_mu, region, site_type, geom, tenure]
    multi_source:                    # MDO 多源列向拼合
      - { store: clickhouse, table: rs_growth, join: parcel_id }   # 遥感长势
      - { store: clickhouse, table: iot_soil,  join: parcel_id }   # IoT 墒情
    quality_gate: { completeness_min: 0.95 }

  - object: ForageSample             # 草样（快检批次）
    materialization: hybrid
    physical:
      store: clickhouse
      table: forage_qc
      key: batch_id
      columns: [CP, NDF, ADF, RFV, 水分, 霉菌毒素]
    quality_gate: { completeness_min: 0.90 }

links:
  - link: treated_by                 # 退化 → 修复方法
    materialization: materialized    # 高频多跳推理主干，物化进图
    from_key: degradation_id
    to_key: method_id

# 遥测绑定（内核能力 telemetry-query-plan）：对象 → 可观测后端，引擎据此产查询计划（不执行）。
telemetry:
  - object: Site                     # 同一对象：metric 走 Prometheus、log 走 Elasticsearch（provider 在 series 级）
    provider: prometheus             # 绑定级默认 provider；log series 覆盖为 elasticsearch
    labels: { parcel: parcel_id }    # 占位 $parcel ← 对象字段 parcel_id（跨 series 共享）
    series:
      - name: soil_moisture          # 墒情（metric/PromQL）
        kind: metric
        template: 'avg(soil_moisture_percent{parcel="$parcel"})'
      - name: ndvi_30d               # 近30天长势（遥感 NDVI）
        kind: metric
        template: 'avg_over_time(ndvi{parcel="$parcel"}[30d])'
      - name: iot_alerts             # 地块 IoT 告警日志（log/Elasticsearch DSL）
        kind: log                    # 运行时过滤：$level / $since 由调用方传 params
        provider: elasticsearch
        template: '{"query":{"bool":{"filter":[{"term":{"parcel":"$parcel"}},{"term":{"level":"$level"}},{"range":{"ts":{"gte":"$since"}}}]}}}'

# 附着知识（读侧参考/诊断，供 Agent 推理；与强制 Rule / 派生 Function 并存）。
# 挂在业务对象上、和对象一次取到（Palantir 式）；kind 标准化（UModel 式模板化）。
knowledge:
  - object: Degradation            # 退化：诊断经验 + 处置手册
    items:
      - name: 盐碱化常见成因
        kind: diagnostic
        content: 盐碱化多因灌溉排水不畅致盐分表聚；重度需先改良再植被恢复。
        refs: [DB15/T 草原生态修复技术规程]
      - name: 退化分级处置手册
        kind: playbook
        content: 轻度补播即可；中重度先工程/化学改良、再喷播乡土草种、后期封育。
  - object: Site                    # 地块：分析模板
    items:
      - name: 地块修复评估模板
        kind: template
        content: 评估维度=土壤盐分/墒情/坡度/水源；据此选修复方法与乡土草种组合。
  - object: RestorationMethod       # 修复方法：领域参考
    items:
      - name: 方法适用性参考
        kind: reference
        content: 喷播适坡面/大面积；补播适轻度退化；两者均需配乡土草种名录。
        refs: [GB/T 37067 退化草地修复技术规范]
  # ---- P1：活跃闭环对象附着知识（草修·出一地一方 / 草易·快检评级）----
  - object: GrassSpecies            # 草种：选种要点
    items:
      - name: 乡土草种选种要点
        kind: reference
        content: 选种先立地适配、再乡土合规、后定配比；碱茅/星星草耐盐碱宜盐渍化立地，披碱草宜沙地/草原不耐盐碱。
        refs: [GB/T 37067 退化草地修复技术规范]
  - object: SeedPack                # 种子包：混播组合设计经验
    items:
      - name: 混播组合设计手册
        kind: playbook
        content: 灌草组合+丸粒化+微生物菌剂；混播比例合计=100%，各草种播量取品种区间；盐碱地以碱茅为主、星星草为辅。
        refs: [DB15/T 草原生态修复技术规程]
  - object: QualityIndex            # 品质指标：判读诊断
    items:
      - name: CP/NDF/ADF/RFV 判读
        kind: diagnostic
        content: RFV 综合评估干草相对饲用价值，CP 高、NDF/ADF 低者优，RFV≥151 为特级；霉菌毒素超标一票否决、不得进入交易。
        refs: [NY/T 1574 苜蓿干草质量分级]
  - object: Standard                # 标准：分级条款摘要
    items:
      - name: NY/T 1574 分级条款摘要
        kind: reference
        content: 苜蓿干草按 RFV 分特级/一级/二级/三级/等外，配套水分与卫生（霉菌毒素）限量要求。
        refs: [NY/T 1574 苜蓿干草质量分级]
  - object: ForageSample            # 草样：快检取样规范
    items:
      - name: 快检取样与近红外规范
        kind: template
        content: 取样需代表性；近红外快检须绑定标准曲线版本；必带 CP/NDF/ADF/RFV；疑霉变样单独隔离、不混检。
        refs: [NY/T 1574 苜蓿干草质量分级]
